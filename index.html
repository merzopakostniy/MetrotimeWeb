<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1214" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/metrotime-mark.svg" />
    <link rel="apple-touch-icon" href="assets/metrotime-mark.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>МетроТайм</title>
  </head>
  <body>
    <div class="app">

      <!-- ───────── ЭКРАНЫ ───────── -->
      <main class="screens">

        <!-- СМЕНЫ -->
        <section class="screen" data-screen="shifts">
          <div class="page-header">
            <h1>Смены</h1>
          </div>
          <p class="placeholder">Список смен</p>
        </section>

        <!-- СЕГОДНЯ (стартовый) -->
        <section class="screen is-active" data-screen="today">
          <div class="page-header">
            <h1>Сегодня</h1>
            <button class="btn-icon" aria-label="Настройки">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
          </div>
          <p class="placeholder">Главный экран</p>
        </section>

        <!-- НОРМА -->
        <section class="screen" data-screen="norm">
          <div class="page-header">
            <h1>Норма</h1>
          </div>
          <p class="placeholder">Норма месяца</p>
        </section>

        <!-- СТАТИСТИКА -->
        <section class="screen" data-screen="stats">
          <div class="page-header">
            <h1>Статистика</h1>
          </div>
          <p class="placeholder">Графики и статистика</p>
        </section>

        <!-- 13 -->
        <section class="screen" data-screen="thirteen">
          <div class="page-header">
            <h1>13</h1>
          </div>
          <p class="placeholder">Раздел 13</p>
        </section>

      </main>

      <!-- ───────── ТАББАР ───────── -->
      <nav class="tabbar" aria-label="Навигация">

        <!-- Смены -->
        <button class="tab" data-target="shifts" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
          <span class="tab-label">Смены</span>
        </button>

        <!-- Сегодня -->
        <button class="tab is-active" data-target="today" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <span class="tab-label">Сегодня</span>
        </button>

        <!-- Норма -->
        <button class="tab" data-target="norm" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </span>
          <span class="tab-label">Норма</span>
        </button>

        <!-- Статистика -->
        <button class="tab" data-target="stats" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
          </span>
          <span class="tab-label">Статистика</span>
        </button>

        <!-- 13 -->
        <button class="tab" data-target="thirteen" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="28" height="28" rx="7" stroke="currentColor" stroke-width="2"/>
              <text x="16" y="22" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="currentColor">13</text>
            </svg>
          </span>
          <span class="tab-label">13</span>
        </button>

      </nav>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
