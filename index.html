<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1214" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/metrotime-mark.svg" />
    <link rel="apple-touch-icon" href="assets/metrotime-mark.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>МетроТайм</title>
  </head>
  <body>
    <div class="app">

      <!-- ───────── ТОПБАР ───────── -->
      <header class="topbar">
        <button class="btn-icon" aria-label="Профиль">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <span class="topbar-title" id="topbarTitle">Смены</span>
        <button class="btn-icon" aria-label="Добавить">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </header>

      <!-- ───────── ЭКРАНЫ ───────── -->
      <main class="screens">

        <!-- СМЕНЫ (стартовый) -->
        <section class="screen is-active" data-screen="shifts">
          <p class="placeholder">Список смен</p>
        </section>

        <!-- СЕГОДНЯ -->
        <section class="screen" data-screen="today">
          <p class="placeholder">Главный экран</p>
        </section>

        <!-- НОРМА -->
        <section class="screen" data-screen="norm">
          <p class="placeholder">Норма месяца</p>
        </section>

        <!-- СТАТИСТИКА -->
        <section class="screen" data-screen="stats">
          <p class="placeholder">Графики и статистика</p>
        </section>

        <!-- 13 -->
        <section class="screen" data-screen="thirteen">
          <p class="placeholder">Раздел 13</p>
        </section>

        <!-- СООБЩЕНИЯ -->
        <section class="screen" data-screen="messages">
          <p class="placeholder">Сообщения</p>
        </section>

      </main>

      <!-- ───────── ТАББАР ───────── -->
      <nav class="tabbar" aria-label="Навигация">

        <!-- Смены -->
        <button class="tab is-active" data-target="shifts" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
          <span class="tab-label">Смены</span>
        </button>

        <!-- Сегодня -->
        <button class="tab" data-target="today" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <span class="tab-label">Сегодня</span>
        </button>

        <!-- Норма -->
        <button class="tab" data-target="norm" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </span>
          <span class="tab-label">Норма</span>
        </button>

        <!-- Статистика -->
        <button class="tab" data-target="stats" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
          </span>
          <span class="tab-label">Статистика</span>
        </button>

        <!-- 13 -->
        <button class="tab" data-target="thirteen" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="28" height="28" rx="7" stroke="currentColor" stroke-width="2"/>
              <text x="16" y="22" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="currentColor">13</text>
            </svg>
          </span>
          <span class="tab-label">13</span>
        </button>


        <!-- Сообщения -->
        <button class="tab" data-target="messages" type="button">
          <span class="tab-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </span>
          <span class="tab-label">Сообщения</span>
        </button>

      </nav>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
